server.port=8080

# 导入本地敏感配置（不纳入版本控制）
spring.config.import=optional:file:./application-local.properties

# 数据库配置（无真实密码）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/geng_direction?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.nailong.gengdirection.mapper=debug
logging.level.org.apache.ibatis.builder.MapperBuilderAssistant=error

# ===== 实验四：Hadoop / HDFS 配置（实测自服务器 root@218.194.47.8）=====
# NameNode RPC 地址（fs.defaultFS），实测端口 10035
hadoop.fs-default-fs=${HADOOP_FS:hdfs://218.194.47.8:10035}
# 操作 HDFS 使用的用户名（服务器上 HDFS 属主为 root）
hadoop.user=${HADOOP_USER:root}
# 行为原始日志在 HDFS 的根目录
hadoop.behavior.raw-dir=/geng/behavior/raw
# 两个 MapReduce 作业的输出目录（分析层从这里读结果）
hadoop.analytics.hotpost-dir=/geng/behavior/out/hotpost
hadoop.analytics.action-dir=/geng/behavior/out/action-dist
# 行为缓冲落盘：每 30s 或攒满 200 条刷一次
behavior.flush.interval-ms=30000
behavior.flush.batch-size=200
# 降低 Hadoop 客户端日志噪音
logging.level.org.apache.hadoop=warn